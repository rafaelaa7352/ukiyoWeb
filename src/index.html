<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightweight Website</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@glidejs/glide/dist/css/glide.core.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@glidejs/glide"></script>
  <script src="script.js" defer></script>
</head>
<body>
<header>
  <nav>
    <h1 id="logo">hab+dash<span class="highlight">.</span></h1>
    <a href="#" class="toggle-nav">Menu ☰</a>
    <ul class="nav-items">
      <li><a href="#">Top Thread</a></li>
      <li><a href="#">Bobbins</a></li>
      <li><a href="#">Stabilizer</a></li>
    </ul>
  </nav>
</header>

<main>
  <section class="grid-section">
    <div class="image-item">
      <img src="https://placehold.co/600x400/png" alt="GLIDE">
      <p>GLIDE</p>
    </div>
    <div class="image-item">
      <img src="https://placehold.co/600x400/png" alt="MAGNETIC CORE BOBBIN">
      <p>MAGNETIC CORE BOBBIN</p>
    </div>
    <div class="image-item">
      <img src="https://placehold.co/600x400/png" alt="PREMIUM STABILIZER">
      <p>PREMIUM STABILIZER</p>
    </div>
  </section>

  <section class="flex-section">
    <div class="text-box">
      <h2>Optimized Performance</h2>
      <p>Enjoy a lightweight, modern world built with the latest standards.</p>
    </div>
    <div class="text-box">
      <h2>Perfect Organization</h2>
      <p>Designed for flexibility.</p>
    </div>
  </section>
  <div class="glide">
    <div class="glide__track" data-glide-el="track">
      <ul class="glide__slides">
        <li class="glide__slide"><img src="https://placehold.co/600x400/png" alt="Slide 1"></li>
        <li class="glide__slide"><img src="https://placehold.co/600x400/png" alt="Slide 2"></li>
        <li class="glide__slide"><img src="https://placehold.co/600x400/png" alt="Slide 3"></li>
      </ul>
    </div>
    <div class="glide__arrows" data-glide-el="controls">
      <button class="glide__arrow glide__arrow--left" data-glide-dir="<">prev</button>
      <button class="glide__arrow glide__arrow--right" data-glide-dir=">">next</button>
    </div>
  </div>
  <footer>
    <div class="footer-content">
      <ul class="footer-links">
        <li><a href="#">Privacy</a></li>
        <li><a href="#">Terms</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </div>
  </footer>
</main>
</body>
</html>
